<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Órarend segédlet — fixed assignments</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; background:#f7f7f8; }
    section { margin-bottom: 18px; background:#fff; border: 1px solid #e3e3e6; padding: 12px; border-radius: 8px;}
    label { display:block; margin:6px 0 2px; font-weight:600; }
    .row { display:flex; gap:12px; align-items:center; margin-bottom:8px;}
    .btn { padding:8px 12px; border-radius:6px; border:1px solid #bbb; background:#fff; cursor:pointer; }
    .btn-primary { background:#0b6cff; color:white; border-color:#0860d6; }
    .small { font-size:0.85rem; padding:6px 8px; }
    input[type="text"], input[type="number"] { padding:8px; border:1px solid #ccc; border-radius:6px; min-width:160px; }
    .checkbox-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .checkbox-grid label { display:flex; gap:6px; align-items:center; background:#f2f6ff; padding:6px 8px; border-radius:6px; border:1px solid #e1e8ff; }
    table { border-collapse: collapse; width:100%; background:white; }
    table td, table th { border: 1px solid #e0e0e0; padding:8px; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.35); display:none; align-items:center; justify-content:center; z-index:2000; }
    .modal { background:white; border-radius:8px; width:720px; max-width:95%; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
    .close-x { float:right; cursor:pointer; color:#888; font-weight:bold; }
    .fixed-subgrid { margin-left:12px; margin-top:6px; margin-bottom:8px; }
    .fixed-subgrid h4 { margin:6px 0; font-weight:600; }
    .muted { color:#666; font-size:0.9rem; }
    .note { font-size:0.9rem; color:#444; margin-top:6px; }
  </style>
</head>
<body>
  <h1>Órarend segédlet — Tanár fix hozzárendelések</h1>

  <section id="teachers-section">
    <h2>Tanárok hozzáadása</h2>
    <label>Név</label>
    <input id="teacher_name_input" placeholder="Kovács Anna" type="text">
    <div class="row" style="margin-top:8px;">
      <div>
        <label>Heti óraszám</label>
        <input id="teacher_weekly_input" type="number" min="0" value="18">
      </div>
      <div style="margin-left:16px;">
        <label>Választott tantárgyak</label>
        <div id="teacher_subjects_container" class="checkbox-grid"></div>
      </div>
    </div>

    <div style="margin-top:10px;">
      <div class="note">Tantárgyanként megadhatod, hogy a tanár mely osztályoknál **fixen** tartja az adott tantárgyat (például: Matematika — 1A).</div>
    </div>

    <div id="teacher_fixed_container" style="margin-top:8px;"></div>

    <div style="margin-top:12px;">
      <button id="add_teacher_btn" class="btn btn-primary">Tanár hozzáadása</button>
    </div>

    <h3 style="margin-top:16px;">Jelenlegi tanárok</h3>
    <ul id="teacher_list"></ul>
  </section>

  <section>
    <h2>Export</h2>
    <a href="/export" target="_blank">JSON megtekintése</a> |
    <a href="/download" target="_blank">data.json letöltése</a>
  </section>

  <!-- EDIT TEACHER MODAL -->
  <div id="modal_teacher" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <span class="close-x" onclick="closeModal('modal_teacher')">✕</span>
      <h3>Tanár szerkesztése</h3>
      <div class="form-row">
        <label>Azonosító (nem szerkeszthető)</label>
        <input id="edit_teacher_id" disabled>
      </div>
      <div class="form-row">
        <label>Név</label>
        <input id="edit_teacher_name">
      </div>
      <div class="form-row">
        <label>Heti óraszám</label>
        <input id="edit_teacher_weekly" type="number" min="0">
      </div>
      <div class="form-row">
        <label>Tantárgyak</label>
        <div id="edit_teacher_subjects" class="checkbox-grid"></div>
      </div>
      <div class="form-row">
        <label>Fix osztályok tantárgyanként</label>
        <div id="edit_teacher_fixed_container"></div>
      </div>
      <div style="margin-top:10px;">
        <button class="btn btn-primary" onclick="saveEditTeacher()">Mentés</button>
        <button class="btn" onclick="closeModal('modal_teacher')">Mégse</button>
      </div>
    </div>
  </div>

<script>
/* ---------- state ---------- */
let currentData = null;

/* ---------- fetch ---------- */
async function fetchData(){
  const resp = await fetch('/data');
  const j = await resp.json();
  currentData = j.data;
  return j.data;
}

/* ---------- renderers ---------- */
function renderTeachers(teachers){
  const ul = document.getElementById('teacher_list'); ul.innerHTML='';
  teachers.forEach(t=>{
    const li = document.createElement('li');
    const fixed = (t.fixed_assignments || []).map(f => `${f.subject}@${f.class}`).join(', ');
    li.innerHTML = `<strong>${t.id}</strong> — ${t.name} — heti: ${t.weekly_required_hours || 0} — tantárgyak: ${t.teaches_subjects.join(', ')} — fix: ${fixed}
      <button class="small btn" onclick="openEditTeacher('${t.id}')">Szerkesztés</button>
      <button class="small btn" onclick="deleteTeacher('${t.id}')">Törlés</button>`;
    ul.appendChild(li);
  });
}

/* populate subject checkboxes and hook fixed grid */
function renderSubjectCheckboxes(){
  const tsc = document.getElementById('teacher_subjects_container'); tsc.innerHTML='';
  if(!currentData) return;
  currentData.subjects.forEach(s=>{
    const id = `add_teach_sub_${s.id}`;
    const d = document.createElement('label');
    d.innerHTML = `<input type="checkbox" id="${id}" value="${s.id}" onchange="onTeachSubjectToggle('${s.id}')"> ${s.name}`;
    tsc.appendChild(d);
  });
}

/* when a subject is toggled in add-form, show/hide the class checkboxes for fixed selection */
function onTeachSubjectToggle(subjectId){
  const container = document.getElementById('teacher_fixed_container');
  // ensure there's a subgrid element per subject
  let sub = document.getElementById('fixed_subgrid_'+subjectId);
  const checked = document.getElementById('add_teach_sub_'+subjectId).checked;
  if(checked && !sub){
    sub = document.createElement('div');
    sub.id = 'fixed_subgrid_'+subjectId;
    sub.className = 'fixed-subgrid';
    let inner = `<h4>Fix osztályok a(z) ${subjectId} tantárgyhoz (pipáld ki):</h4><div class="checkbox-grid">`;
    currentData.classes.forEach(c=>{
      inner += `<label><input type="checkbox" data-subject="${subjectId}" value="${c.id}"> ${c.name}</label>`;
    });
    inner += `</div>`;
    sub.innerHTML = inner;
    container.appendChild(sub);
  } else if(!checked && sub){
    sub.remove();
  }
}

/* collect fixed_assignments from add form */
function collectFixedAssignmentsFromAddForm(){
  const fixes = [];
  const checks = document.querySelectorAll('#teacher_fixed_container input[type=checkbox]');
  checks.forEach(cb=>{
    if(cb.checked){
      fixes.push({ subject: cb.dataset.subject, class: cb.value });
    }
  });
  return fixes;
}

/* ---------- add teacher ---------- */
document.getElementById('add_teacher_btn').addEventListener('click', async ()=>{
  const name = document.getElementById('teacher_name_input').value.trim();
  const weekly = document.getElementById('teacher_weekly_input').value || 0;
  if(!name){ alert('Adj meg tanár nevet!'); return; }
  const teaches = [];
  currentData.subjects.forEach(s => {
    const el = document.getElementById('add_teach_sub_'+s.id);
    if(el && el.checked) teaches.push(s.id);
  });
  const fixed_assignments = collectFixedAssignmentsFromAddForm();

  // validate: each fixed assignment's subject must be in teaches
  for(const fa of fixed_assignments){
    if(!teaches.includes(fa.subject)){
      alert(`Fix beosztás megadva tantárgyra (${fa.subject}), amit nem választottál ki tanítandó tantárgyként.`);
      return;
    }
  }

  const resp = await fetch('/add_teacher', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({teacher_name: name, weekly_hours: weekly, teaches: teaches, fixed_assignments: fixed_assignments})
  });
  const j = await resp.json();
  if(!j.success){ alert(j.error || 'Hiba'); return; }
  // clear form
  document.getElementById('teacher_name_input').value='';
  document.getElementById('teacher_weekly_input').value='18';
  // uncheck subject boxes
  currentData.subjects.forEach(s => { const el = document.getElementById('add_teach_sub_'+s.id); if(el) el.checked=false; });
  document.getElementById('teacher_fixed_container').innerHTML='';
  await refreshAll();
});

/* ---------- edit teacher modal logic ---------- */
function openEditTeacher(id){
  const t = currentData.teachers.find(x => x.id === id);
  if(!t) return alert('Nem található a tanár.');
  document.getElementById('edit_teacher_id').value = t.id;
  document.getElementById('edit_teacher_name').value = t.name;
  document.getElementById('edit_teacher_weekly').value = t.weekly_required_hours || 0;

  // populate subject checkboxes
  const cont = document.getElementById('edit_teacher_subjects');
  cont.innerHTML = '';
  currentData.subjects.forEach(s=>{
    const id = 'edit_teach_sub_'+s.id;
    const checked = (t.teaches_subjects || []).includes(s.id);
    const d = document.createElement('label');
    d.innerHTML = `<input type="checkbox" id="${id}" value="${s.id}" onchange="onEditTeachSubToggle('${s.id}')"> ${s.name}`;
    cont.appendChild(d);
    // set checked after adding
    setTimeout(()=>{ const el = document.getElementById(id); if(el) el.checked = checked; }, 0);
  });

  // build fixed container
  buildEditFixedContainer(t);

  openModal('modal_teacher');
}

function buildEditFixedContainer(teacher){
  const container = document.getElementById('edit_teacher_fixed_container');
  container.innerHTML = '';
  // for each subject, create subgrid (but hide if not taught)
  currentData.subjects.forEach(s=>{
    const sub = document.createElement('div');
    sub.id = 'edit_fixed_subgrid_'+s.id;
    sub.className = 'fixed-subgrid';
    let inner = `<h4>${s.name} — fix osztályok:</h4><div class="checkbox-grid">`;
    currentData.classes.forEach(c=>{
      const faExists = (teacher.fixed_assignments || []).some(f => f.subject === s.id && f.class === c.id);
      inner += `<label><input type="checkbox" data-subject="${s.id}" value="${c.id}" ${faExists ? 'checked' : ''}> ${c.name}</label>`;
    });
    inner += '</div>';
    sub.innerHTML = inner;
    container.appendChild(sub);
    // hide the subgrid initially if teacher doesn't teach this subject
    const teaches = (teacher.teaches_subjects || []).includes(s.id);
    if(!teaches) sub.style.display = 'none';
  });
}

/* when toggling subject checkbox in edit modal, show/hide corresponding fixed grid */
function onEditTeachSubToggle(subjectId){
  const cb = document.getElementById('edit_teach_sub_'+subjectId);
  const sub = document.getElementById('edit_fixed_subgrid_'+subjectId);
  if(!sub) return;
  sub.style.display = cb.checked ? 'block' : 'none';
}

/* construct fixed_assignments from edit modal */
function collectFixedAssignmentsFromEditModal(){
  const fixes = [];
  const checks = document.querySelectorAll('#edit_teacher_fixed_container input[type=checkbox]');
  checks.forEach(cb=>{
    if(cb.checked){
      fixes.push({ subject: cb.dataset.subject, class: cb.value });
    }
  });
  return fixes;
}

/* save edited teacher */
async function saveEditTeacher(){
  const id = document.getElementById('edit_teacher_id').value;
  const newName = document.getElementById('edit_teacher_name').value.trim();
  const weekly = document.getElementById('edit_teacher_weekly').value || 0;
  const teaches = [];
  currentData.subjects.forEach(s => {
    const el = document.getElementById('edit_teach_sub_'+s.id);
    if(el && el.checked) teaches.push(s.id);
  });
  const fixed_assignments = collectFixedAssignmentsFromEditModal();

  // validation: fixed assignments subject must be in teaches
  for(const fa of fixed_assignments){
    if(!teaches.includes(fa.subject)){
      alert(`Fix beosztás megadva tantárgyra (${fa.subject}), amelyet a tanár nem tanít (előbb jelöld be tantárgyként).`);
      return;
    }
  }

  const resp = await fetch('/update_teacher', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id: id, new_name: newName, weekly_hours: weekly, teaches: teaches, fixed_assignments: fixed_assignments})
  });
  const j = await resp.json();
  if(!j.success){ alert(j.error || 'Hiba'); return; }
  closeModal('modal_teacher');
  await refreshAll();
}

/* ---------- delete teacher ---------- */
async function deleteTeacher(id){
  if(!confirm('Biztos törlöd a tanárt?')) return;
  const resp = await fetch('/delete_teacher', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id: id})
  });
  const j = await resp.json();
  if(!j.success){ alert(j.error || 'Hiba'); return; }
  await refreshAll();
}

/* ---------- modal helpers ---------- */
function openModal(id){ document.getElementById(id).style.display = 'flex'; }
function closeModal(id){ document.getElementById(id).style.display = 'none'; }

/* ---------- refresh ---------- */
async function refreshAll(){
  const data = await fetchData();
  renderTeachers(data.teachers || []);
  renderSubjectCheckboxes();
  // clear any fixed container
  document.getElementById('teacher_fixed_container').innerHTML = '';
  // ensure edit modal fixed container exists
  const efc = document.getElementById('edit_teacher_fixed_container');
  if(efc) efc.innerHTML = '';
}

/* run initial load */
refreshAll();

</script>
</body>
</html>
